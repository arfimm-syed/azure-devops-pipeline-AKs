trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:

# Install Terraform manually
- script: |
    wget https://releases.hashicorp.com/terraform/1.6.6/terraform_1.6.6_linux_amd64.zip
    unzip terraform_1.6.6_linux_amd64.zip
    sudo mv terraform /usr/local/bin/
    terraform --version
  displayName: Install Terraform

# Azure Login using Service Principal
- script: |
    echo "Logging into Azure using Service Principal..."

    az login --service-principal \
      --username $(client_id) \
      --password $(client_secret) \
      --tenant $(tenant_id)

    az account set --subscription $(subscription_id)

    echo "Azure Login Successful"
  displayName: Azure SP Login

# Terraform Init
- script: |
    terraform init
  displayName: Terraform Init

- task: TerraformCLI@2
  inputs:
    command: 'apply'
    workingDirectory: '$(System.DefaultWorkingDirectory)azure-devops-pipeline-AKs'
    environmentServiceName: 'Kubernetes-Docker-pipeliens'
    providerAzureRmSubscriptionId: 'c8981bbe-3eda-4ec3-8066-620482a1a9fc'
    commandOptions: '-var client_id=$(client_id) -var client_secret=$(client_secret) -var tenant_id=$(tenant_id))'
    allowTelemetryCollection: true
    
# Terraform Apply
- script: |
    terraform apply -auto-approve
  displayName: Terraform Apply